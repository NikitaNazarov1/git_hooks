# Default config for each check. Overrides live in .rails_git_hooks.yml (sparse).
# Structure matches .rails_git_hooks.yml: hook section -> check config_name -> options.

PreCommit:
  DefaultBranch:
    enabled: true
    quiet: false
    on_fail: fail
    on_warn: warn
    on_missing_dependency: warn
    include: []
    exclude: []
    dependencies: {}
    command: []
    description: Prevent commits on default branch
    file_based: false

  DebuggerCheck:
    enabled: true
    quiet: false
    on_fail: warn
    on_warn: warn
    on_missing_dependency: warn
    include: []
    exclude: []
    dependencies: {}
    command: []
    description: Warn on debugger statements
    file_based: true

  YAMLFormatCheck:
    enabled: true
    quiet: false
    on_fail: warn
    on_warn: warn
    on_missing_dependency: warn
    include: []
    exclude: []
    dependencies: {}
    command: []
    description: Warn on invalid YAML
    file_based: true

  JSONFormatCheck:
    enabled: true
    quiet: false
    on_fail: warn
    on_warn: warn
    on_missing_dependency: warn
    include: []
    exclude: []
    dependencies: {}
    command: []
    description: Warn on invalid JSON
    file_based: true

  MigrationsCheck:
    enabled: true
    quiet: false
    on_fail: warn
    on_warn: warn
    on_missing_dependency: warn
    include: []
    exclude: []
    dependencies: {}
    command: []
    description: Warn on missing schema files after migrations
    file_based: true

  WhitespaceCheck:
    enabled: false
    quiet: false
    on_fail: fail
    on_warn: warn
    on_missing_dependency: warn
    include: []
    exclude: []
    dependencies: {}
    command: []
    description: Reject trailing whitespace and conflict markers
    file_based: true

  RuboCop:
    enabled: false
    quiet: true
    on_fail: fail
    on_warn: warn
    on_missing_dependency: warn
    include: []
    exclude: []
    dependencies:
      executables: [bundle]
      libraries: [rubocop]
    command: [bundle, exec, rubocop]
    description: Run RuboCop on staged Ruby files
    file_based: true
    install_hint: Add `gem "rubocop"` to your Gemfile and run bundle install

  RailsBestPractices:
    enabled: false
    quiet: true
    on_fail: warn
    on_warn: warn
    on_missing_dependency: warn
    include: []
    exclude: []
    dependencies:
      executables: [bundle]
      libraries: [rails_best_practices]
    command: [bundle, exec, rails_best_practices]
    description: Warn on Rails best practices violations
    file_based: true
    install_hint: Add `gem "rails_best_practices"` to your Gemfile and run bundle install

  ErbLint:
    enabled: false
    quiet: true
    on_fail: fail
    on_warn: warn
    on_missing_dependency: warn
    include: []
    exclude: []
    dependencies:
      executables: [bundle]
      libraries: [erblint]
    command: [bundle, exec, erblint]
    description: Run erblint on staged ERB files
    file_based: true
    install_hint: Add `gem "erblint"` to your Gemfile and run bundle install

  Eslint:
    enabled: false
    quiet: true
    on_fail: fail
    on_warn: warn
    on_missing_dependency: warn
    include: []
    exclude: []
    dependencies:
      executables: [eslint]
    command: [eslint]
    description: Run eslint on staged JavaScript files
    file_based: true
    install_hint: Install eslint (e.g. npm install -D eslint) or override command in config

  Golint:
    enabled: false
    quiet: true
    on_fail: fail
    on_warn: warn
    on_missing_dependency: warn
    include: []
    exclude: []
    dependencies:
      executables: [golint]
    command: [golint]
    description: Run golint on staged Go files
    file_based: true
    install_hint: Install golint (e.g. go install golang.org/x/lint/golint@latest) or override command in config

  HamlLint:
    enabled: false
    quiet: true
    on_fail: fail
    on_warn: warn
    on_missing_dependency: warn
    include: []
    exclude: []
    dependencies:
      executables: [bundle]
      libraries: [haml_lint]
    command: [bundle, exec, haml-lint]
    description: Run haml-lint on staged HAML files
    file_based: true
    install_hint: Add `gem "haml_lint"` to your Gemfile and run bundle install

  Jslint:
    enabled: false
    quiet: true
    on_fail: fail
    on_warn: warn
    on_missing_dependency: warn
    include: []
    exclude: []
    dependencies:
      executables: [jslint]
    command: [jslint]
    description: Run jslint on staged JavaScript files
    file_based: true
    install_hint: Install jslint (e.g. npm install -D jslint or npm install -g jslint) or override command in config

  PhpLint:
    enabled: false
    quiet: true
    on_fail: fail
    on_warn: warn
    on_missing_dependency: warn
    include: []
    exclude: []
    dependencies:
      executables: [php]
    command: [php, "-l"]
    description: Run php -l (syntax check) on staged PHP files
    file_based: true
    install_hint: Ensure PHP is installed and on PATH

  Pylint:
    enabled: false
    quiet: true
    on_fail: fail
    on_warn: warn
    on_missing_dependency: warn
    include: []
    exclude: []
    dependencies:
      executables: [pylint]
    command: [pylint]
    description: Run pylint on staged Python files
    file_based: true
    install_hint: Install pylint (e.g. pip install pylint) or override command in config

  ScssLint:
    enabled: false
    quiet: true
    on_fail: fail
    on_warn: warn
    on_missing_dependency: warn
    include: []
    exclude: []
    dependencies:
      executables: [bundle]
      libraries: [scss_lint]
    command: [bundle, exec, scss-lint]
    description: Run scss-lint on staged SCSS files
    file_based: true
    install_hint: Add `gem "scss_lint"` to your Gemfile and run bundle install

  GoVet:
    enabled: false
    quiet: true
    on_fail: fail
    on_warn: warn
    on_missing_dependency: warn
    include: []
    exclude: []
    dependencies:
      executables: [go]
    command: [go, vet]
    description: Run go vet on staged Go files
    file_based: true
    install_hint: Ensure Go toolchain is installed and on PATH

CommitMsg:
  JiraPrefix:
    enabled: true
    quiet: false
    on_fail: fail
    on_warn: warn
    on_missing_dependency: warn
    include: []
    exclude: []
    dependencies: {}
    command: []
    description: Prefix commit messages with ticket id from branch
    file_based: false

  NotEmpty:
    enabled: true
    quiet: false
    on_fail: fail
    on_warn: warn
    on_missing_dependency: warn
    include: []
    exclude: []
    dependencies: {}
    command: []
    description: Reject empty commit messages
    file_based: false

PrePush:
  RunTests:
    enabled: false
    quiet: false
    on_fail: fail
    on_warn: warn
    on_missing_dependency: warn
    include: []
    exclude: []
    dependencies:
      executables: [bundle]
      libraries: [rspec]
    command: [bundle, exec, rspec]
    description: Run test suite before push
    file_based: false
    install_hint: Install test dependencies and ensure `bundle exec rspec` runs successfully

  RunPytest:
    enabled: false
    quiet: false
    on_fail: fail
    on_warn: warn
    on_missing_dependency: warn
    include: []
    exclude: []
    dependencies:
      executables: [pytest]
    command: [pytest]
    description: Run pytest test suite before push
    file_based: false
    install_hint: Install pytest (e.g. pip install pytest) and ensure pytest runs successfully

  RunGoTest:
    enabled: false
    quiet: false
    on_fail: fail
    on_warn: warn
    on_missing_dependency: warn
    include: []
    exclude: []
    dependencies:
      executables: [go]
    command: [go, test, "./..."]
    description: Run go test suite before push
    file_based: false
    install_hint: Ensure Go toolchain is installed and `go test ./...` runs successfully

PostCheckout:
  BundleInstall:
    enabled: false
    quiet: false
    on_fail: fail
    on_warn: warn
    on_missing_dependency: warn
    include: [Gemfile, Gemfile.lock]
    exclude: []
    dependencies:
      executables: [bundle]
    command: [bundle, install]
    description: Run bundle install when Gemfile or Gemfile.lock changed (branch checkout)
    file_based: true
    install_hint: Ensure bundle is available

  DbMigrate:
    enabled: false
    quiet: false
    on_fail: fail
    on_warn: warn
    on_missing_dependency: warn
    include: [db/migrate/*.rb, db/schema.rb, db/structure.sql]
    exclude: []
    dependencies:
      executables: [bundle]
    command: [bundle, exec, rails, db:migrate]
    description: Run db:migrate when migrations or schema changed (branch checkout)
    file_based: true
    install_hint: Rails app with db:migrate (or override command in config)

  NpmInstall:
    enabled: false
    quiet: false
    on_fail: fail
    on_warn: warn
    on_missing_dependency: warn
    include: [package.json, package-lock.json]
    exclude: []
    dependencies:
      executables: [npm]
    command: [npm, install]
    description: Run npm install when package.json or package-lock.json changed (branch checkout)
    file_based: true
    install_hint: Ensure npm is available

  YarnInstall:
    enabled: false
    quiet: false
    on_fail: fail
    on_warn: warn
    on_missing_dependency: warn
    include: [package.json, yarn.lock]
    exclude: []
    dependencies:
      executables: [yarn]
    command: [yarn, install]
    description: Run yarn install when package.json or yarn.lock changed (branch checkout)
    file_based: true
    install_hint: Ensure yarn is available

PostMerge:
  BundleInstall:
    enabled: false
    quiet: false
    on_fail: fail
    on_warn: warn
    on_missing_dependency: warn
    include: [Gemfile, Gemfile.lock]
    exclude: []
    dependencies:
      executables: [bundle]
    command: [bundle, install]
    description: Run bundle install when Gemfile or Gemfile.lock changed (after merge)
    file_based: true
    install_hint: Ensure bundle is available

  DbMigrate:
    enabled: false
    quiet: false
    on_fail: fail
    on_warn: warn
    on_missing_dependency: warn
    include: [db/migrate/*.rb, db/schema.rb, db/structure.sql]
    exclude: []
    dependencies:
      executables: [bundle]
    command: [bundle, exec, rails, db:migrate]
    description: Run db:migrate when migrations or schema changed (after merge)
    file_based: true
    install_hint: Rails app with db:migrate (or override command in config)

  NpmInstall:
    enabled: false
    quiet: false
    on_fail: fail
    on_warn: warn
    on_missing_dependency: warn
    include: [package.json, package-lock.json]
    exclude: []
    dependencies:
      executables: [npm]
    command: [npm, install]
    description: Run npm install when package.json or package-lock.json changed (after merge)
    file_based: true
    install_hint: Ensure npm is available

  YarnInstall:
    enabled: false
    quiet: false
    on_fail: fail
    on_warn: warn
    on_missing_dependency: warn
    include: [package.json, yarn.lock]
    exclude: []
    dependencies:
      executables: [yarn]
    command: [yarn, install]
    description: Run yarn install when package.json or yarn.lock changed (after merge)
    file_based: true
    install_hint: Ensure yarn is available
