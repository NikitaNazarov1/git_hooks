# Relax cops that would require heavy refactors for this small gem

AllCops:
  NewCops: enable
  UseCache: false

Layout/LineLength:
  Max: 125

Style/MultilineBlockChain:
  Enabled: false

Style/Documentation:
  Enabled: false

Metrics/ClassLength:
  Max: 140

Metrics/MethodLength:
  Max: 35

Metrics/AbcSize:
  Max: 30

Metrics/CyclomaticComplexity:
  Max: 10

Metrics/PerceivedComplexity:
  Max: 10

Metrics/ParameterLists:
  Max: 6

# Optional / project preference
Gemspec/RequireMFA:
  Enabled: false
Gemspec/DevelopmentDependencies:
  Enabled: false

# Specs often have long describe blocks
Metrics/BlockLength:
  Exclude:
    - 'spec/**/*_spec.rb'

# Templates and hooks/ are copied to .git/hooks and made executable at install/sync time
Lint/ScriptPermission:
  Exclude:
    - 'templates/hooks/*'
    - 'hooks/*'

# Hooks and templates are small scripts; avoid style churn
Style/FileWrite:
  Enabled: false
Style/SelectByRegexp:
  Enabled: false
Style/RedundantRegexpArgument:
  Enabled: false
Style/RedundantArgument:
  Enabled: false
