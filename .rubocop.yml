# Relax cops that would require heavy refactors for this small gem

AllCops:
  NewCops: enable
  UseCache: false

Layout/LineLength:
  Max: 125

Style/MultilineBlockChain:
  Enabled: false

Style/Documentation:
  Enabled: false

Metrics/ClassLength:
  Max: 120

Metrics/MethodLength:
  Max: 25

Metrics/AbcSize:
  Max: 20

# Optional / project preference
Gemspec/RequireMFA:
  Enabled: false
Gemspec/DevelopmentDependencies:
  Enabled: false

# Specs often have long describe blocks
Metrics/BlockLength:
  Exclude:
    - 'spec/**/*_spec.rb'

# Hooks and templates are small scripts; avoid style churn
Style/FileWrite:
  Enabled: false
Style/SelectByRegexp:
  Enabled: false
Style/RedundantRegexpArgument:
  Enabled: false
Style/RedundantArgument:
  Enabled: false
